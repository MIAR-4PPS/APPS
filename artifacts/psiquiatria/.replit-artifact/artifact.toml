kind = "mobile"
previewPath = "/"
title = "PsiApp — Assistente de Psiquiatria"
version = "1.0.0"
id = "artifacts/psiquiatria"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18772

[services.development]
run = "pnpm --filter @workspace/psiquiatria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/psiquiatria", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/psiquiatria", "run", "serve" ]

[services.env]
PORT = "18772"
BASE_PATH = "/"
