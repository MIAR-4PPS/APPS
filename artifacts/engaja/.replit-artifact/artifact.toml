kind = "web"
previewPath = "/engaja/"
title = "Engaja IA"
version = "1.0.0"
id = "artifacts/engaja"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/engaja/" ]
localPort = 20344

[services.development]
run = "pnpm --filter @workspace/engaja run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/engaja", "run", "build" ]
publicDir = "artifacts/engaja/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20344"
BASE_PATH = "/engaja/"
